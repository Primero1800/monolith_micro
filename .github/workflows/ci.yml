name: CI

on:
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    env:
      APP_NAME: test_monolith
      APP_VERSION: "0.1.0"
      POSTGRES_HOST: localhost
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_PORT: 5432
      POSTGRES_DB: test_db
      POOL_SIZE: 5
      MAX_OVERFLOW: 5
      POOL_TIMEOUT: 30
      POOL_RECYCLE: 1800
      LOG_LEVEL: DEBUG
      AIOHTTP_TIMEOUT_SECONDS: 30
      AIOHTTP_KEEPALIVE_TIMEOUT: 30
      HEALTH_CHECK_TIMEOUT_SEC: 5
      LLM_BASE_URL: https://api.mistral.ai/v1
      LLM_API_KEY: ""
      LLM_MODEL: mistral-small-latest
      LLM_TIMEOUT_SEC: 30
      SCHEDULER_TICK_SEC: 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pip install poetry==2.1.3

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Ruff format
        run: poetry run ruff format --check app tests

      - name: Ruff
        run: poetry run ruff check app tests

      - name: Mypy
        run: poetry run mypy app

      - name: Tests
        run: poetry run pytest --cov-report=term-missing:skip-covered --cov=app tests/
